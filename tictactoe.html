<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #53d8fb; }

    .cell.win { background: #0f3460; }

    #reset {
      margin-top: 2rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.8;
    }

    #score span { text-align: center; }
    #score .label { font-size: 0.75rem; opacity: 0.7; display: block; }
    #score .val { font-size: 1.5rem; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>

  <div id="score">
    <span><span class="label" style="color:#e94560">X Wins</span><span class="val" id="xScore">0</span></span>
    <span><span class="label">Draws</span><span class="val" id="draws">0</span></span>
    <span><span class="label" style="color:#53d8fb">O Wins</span><span class="val" id="oScore">0</span></span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const score = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const xScore = document.getElementById('xScore');
    const oScore = document.getElementById('oScore');
    const draws  = document.getElementById('draws');

    function init() {
      board   = Array(9).fill(null);
      current = 'X';
      over    = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { winner: board[a], line: [a, b, c] };
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const result = checkWinner();
        if (result) {
          over = true;
          if (result.winner) {
            result.line.forEach(idx => cells[idx].classList.add('win'));
            status.textContent = `${result.winner} wins!`;
            score[result.winner]++;
          } else {
            status.textContent = "It's a draw!";
            score.D++;
          }
          xScore.textContent = score.X;
          oScore.textContent = score.O;
          draws.textContent  = score.D;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
